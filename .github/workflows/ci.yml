name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install (no-op if no package.json)
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi
      - name: Lint / Build placeholder
        run: |
          echo "No code yet — CI placeholder step succeeds"

  build-images:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ env.IMAGE_PUSH == 'true' }}
          tags: |
            ${{ env.BACKEND_IMAGE || 'tiny-teller-backend:latest' }}
      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ env.IMAGE_PUSH == 'true' }}
          tags: |
            ${{ env.FRONTEND_IMAGE || 'tiny-teller-frontend:latest' }}

    env:
      # Configure these via repository or organization secrets if you want CI to push images
      IMAGE_PUSH: false
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tiny-teller-backend:latest
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tiny-teller-frontend:latest
