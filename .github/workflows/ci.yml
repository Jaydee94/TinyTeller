name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install (no-op if no package.json)
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi
      - name: Lint / Build placeholder
        run: |
          echo "No code yet — CI placeholder step succeeds"
