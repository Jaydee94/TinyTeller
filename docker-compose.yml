version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tiny
      POSTGRES_PASSWORD: tiny
      POSTGRES_DB: tiny_teller
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://tiny:tiny@postgres:5432/tiny_teller
      PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://localhost:8080/api
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  pgdata:
