<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <!-- Dreamy Nightsky background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B1340"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
    <!-- Crescent mask for the banner owl illustration -->
    <mask id="crescent-mask">
      <circle cx="99" cy="112" r="27" fill="white"/>
      <circle cx="111" cy="106" r="22" fill="black"/>
    </mask>
    <!-- Soft golden halo behind the moon -->
    <radialGradient id="moon-glow" cx="99" cy="112" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="20" fill="url(#bgGrad)"/>

  <!-- ── Stars ── -->
  <!-- 4-point star (silver) near illustration -->
  <path d="M38 38 L39.5 43 L45 44.5 L39.5 46 L38 51 L36.5 46 L31 44.5 L36.5 43 Z"
        fill="#E8ECF7" opacity="0.90"/>
  <!-- Small sparkle near title -->
  <path d="M213 35 L214 39 L218 40 L214 41 L213 45 L212 41 L208 40 L212 39 Z"
        fill="#E8ECF7" opacity="0.80"/>
  <!-- 4-point star top-right (gold) -->
  <path d="M720 30 L722 38 L730 40 L722 42 L720 50 L718 42 L710 40 L718 38 Z"
        fill="#FFD166" opacity="0.82"/>
  <!-- Dot stars -->
  <circle cx="155" cy="28"  r="2.5" fill="#FFD166" opacity="0.85"/>
  <circle cx="22"  cy="82"  r="2"   fill="#E8ECF7" opacity="0.60"/>
  <circle cx="170" cy="160" r="1.5" fill="#E8ECF7" opacity="0.50"/>
  <circle cx="758" cy="155" r="2.5" fill="#E8ECF7" opacity="0.55"/>
  <circle cx="780" cy="65"  r="2"   fill="#FFD166" opacity="0.50"/>

  <!-- Moon halo glow -->
  <circle cx="99" cy="112" r="40" fill="url(#moon-glow)"/>

  <!-- ── Crescent moon ── -->
  <circle cx="99" cy="112" r="27" fill="#FFD166" mask="url(#crescent-mask)"/>

  <!-- ── Owl ── -->
  <!-- Wings (behind body) -->
  <path d="M74 90 Q66 85 68 97 Q74 94 74 101 Z" fill="#3A2070"/>
  <path d="M102 90 Q110 85 108 97 Q102 94 102 101 Z" fill="#3A2070"/>

  <!-- Body -->
  <ellipse cx="88" cy="94" rx="14" ry="16" fill="#4A2E8C"/>
  <!-- Belly highlight -->
  <ellipse cx="88" cy="97" rx="8" ry="10" fill="#6B4BAE" opacity="0.75"/>

  <!-- Head -->
  <circle cx="88" cy="72" r="16" fill="#4A2E8C"/>
  <!-- Ear tufts -->
  <polygon points="77,61 82,52 86,61" fill="#4A2E8C"/>
  <polygon points="90,61 94,52 99,61" fill="#4A2E8C"/>
  <!-- Face disc -->
  <ellipse cx="88" cy="74" rx="11" ry="10" fill="#6B4BAE" opacity="0.80"/>

  <!-- Sleepy closed eyes -->
  <path d="M80 73 Q84 70 87 73" fill="none" stroke="#F5F0FF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M89 73 Q93 70 96 73" fill="none" stroke="#F5F0FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyelash dots -->
  <circle cx="84" cy="69" r="1.1" fill="#F5F0FF" opacity="0.55"/>
  <circle cx="93" cy="69" r="1.1" fill="#F5F0FF" opacity="0.55"/>

  <!-- Beak -->
  <polygon points="86,80 90,80 88,85" fill="#FFD166"/>

  <!-- Feet resting on the moon -->
  <line x1="83" y1="109" x2="79" y2="114" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83" y1="109" x2="83" y2="115" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="109" x2="97" y2="114" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="109" x2="93" y2="115" stroke="#FFD166" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Text ── -->
  <text x="220" y="100" font-family="Nunito, system-ui, sans-serif"
        font-size="52" font-weight="900" fill="#F5F0FF" letter-spacing="-0.5">TinyTeller</text>
  <text x="222" y="138" font-family="Nunito, system-ui, sans-serif"
        font-size="20" fill="#C9A7FF" letter-spacing="0.5">🌙 Dreamy stories for little dreamers</text>
</svg>
