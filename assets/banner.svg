<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1033"/>
      <stop offset="55%"  stop-color="#1a1f5c"/>
      <stop offset="100%" stop-color="#0f1a45"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f9a03f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f9a03f" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <circle cx="100" cy="100" r="58" fill="white"/>
      <circle cx="128"  cy="83"  r="48" fill="black"/>
    </mask>
    <linearGradient id="pageL" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff7e6"/>
      <stop offset="100%" stop-color="#fde8c0"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fde8c0"/>
      <stop offset="100%" stop-color="#fff7e6"/>
    </linearGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="800" height="200" rx="18" fill="url(#sky)"/>

  <!-- Moon glow -->
  <circle cx="100" cy="100" r="88" fill="url(#moonGlow)"/>

  <!-- Crescent moon -->
  <circle cx="100" cy="100" r="58" fill="#f9a03f" mask="url(#crescent)"/>

  <!-- Moon surface texture -->
  <circle cx="79"  cy="93"  r="5"   fill="#e08826" opacity="0.38"/>
  <circle cx="88"  cy="116" r="3.5" fill="#e08826" opacity="0.32"/>

  <!-- 4-pointed sparkle stars -->
  <path d="M190,19 L191.7,24.6 L197.5,26.5 L191.7,28.4 L190,34  L188.3,28.4 L182.5,26.5 L188.3,24.6Z" fill="white"   opacity="0.90"/>
  <path d="M318,8  L319.4,13.2 L324.5,15  L319.4,16.8 L318,22  L316.6,16.8 L311.5,15  L316.6,13.2Z" fill="#f9a03f" opacity="0.80"/>
  <path d="M558,13 L559.5,18.5 L565,20.5  L559.5,22.5 L558,28  L556.5,22.5 L551,20.5  L556.5,18.5Z" fill="white"   opacity="0.75"/>
  <path d="M695,22 L696.4,27.3 L701.5,29  L696.4,30.7 L695,36  L693.6,30.7 L688.5,29  L693.6,27.3Z" fill="#f9a03f" opacity="0.75"/>
  <path d="M760,9  L761.4,14.3 L766.5,16  L761.4,17.7 L760,23  L758.6,17.7 L753.5,16  L758.6,14.3Z" fill="#c4b5fd" opacity="0.80"/>

  <!-- Tiny dot stars -->
  <circle cx="238" cy="40" r="2"   fill="white"   opacity="0.65"/>
  <circle cx="265" cy="18" r="1.5" fill="white"   opacity="0.70"/>
  <circle cx="352" cy="34" r="2"   fill="#f9a03f" opacity="0.55"/>
  <circle cx="408" cy="17" r="1.5" fill="white"   opacity="0.60"/>
  <circle cx="443" cy="42" r="2"   fill="white"   opacity="0.55"/>
  <circle cx="488" cy="14" r="1.5" fill="#f9a03f" opacity="0.65"/>
  <circle cx="517" cy="44" r="2"   fill="white"   opacity="0.50"/>
  <circle cx="603" cy="27" r="2"   fill="white"   opacity="0.60"/>
  <circle cx="638" cy="46" r="1.5" fill="white"   opacity="0.55"/>
  <circle cx="725" cy="24" r="2"   fill="white"   opacity="0.65"/>
  <circle cx="780" cy="38" r="1.5" fill="#f9a03f" opacity="0.50"/>
  <circle cx="172" cy="50" r="1.5" fill="white"   opacity="0.45"/>
  <circle cx="425" cy="54" r="1.5" fill="white"   opacity="0.45"/>
  <circle cx="608" cy="55" r="1.5" fill="#c4b5fd" opacity="0.50"/>

  <!-- Title -->
  <text
    x="385" y="96"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="62"
    font-weight="bold"
    fill="white"
    letter-spacing="1">TinyTeller</text>

  <!-- Tagline -->
  <text
    x="385" y="148"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', serif"
    font-size="16.5"
    fill="#f9a03f"
    letter-spacing="0.3">&#10024; Instant magic stories for little listeners</text>

  <!-- ── Open Book (right side) ── -->
  <!-- Book shadow -->
  <ellipse cx="700" cy="175" rx="56" ry="7" fill="#000" opacity="0.18"/>

  <!-- Left cover -->
  <rect x="643" y="60" width="60" height="110" rx="4" fill="#e08826"/>
  <!-- Right cover -->
  <rect x="703" y="60" width="60" height="110" rx="4" fill="#c8760e"/>
  <!-- Spine -->
  <rect x="700" y="60" width="6"  height="110" fill="#9a5800"/>

  <!-- Left page (paper) -->
  <rect x="646" y="65" width="53" height="100" rx="2" fill="url(#pageL)"/>
  <!-- Right page (paper) -->
  <rect x="709" y="65" width="53" height="100" rx="2" fill="url(#pageR)"/>

  <!-- Left page text lines -->
  <line x1="654" y1="80"  x2="696" y2="80"  stroke="#c8920a" stroke-width="1.5" opacity="0.55"/>
  <line x1="654" y1="89"  x2="696" y2="89"  stroke="#c8920a" stroke-width="1.5" opacity="0.50"/>
  <line x1="654" y1="98"  x2="696" y2="98"  stroke="#c8920a" stroke-width="1.5" opacity="0.50"/>
  <line x1="654" y1="107" x2="696" y2="107" stroke="#c8920a" stroke-width="1.5" opacity="0.45"/>
  <line x1="654" y1="116" x2="696" y2="116" stroke="#c8920a" stroke-width="1.5" opacity="0.45"/>
  <line x1="654" y1="125" x2="688" y2="125" stroke="#c8920a" stroke-width="1.5" opacity="0.40"/>
  <line x1="654" y1="134" x2="692" y2="134" stroke="#c8920a" stroke-width="1.5" opacity="0.40"/>
  <line x1="654" y1="143" x2="683" y2="143" stroke="#c8920a" stroke-width="1.5" opacity="0.35"/>
  <line x1="654" y1="152" x2="690" y2="152" stroke="#c8920a" stroke-width="1.5" opacity="0.30"/>

  <!-- Right page text lines -->
  <line x1="716" y1="80"  x2="758" y2="80"  stroke="#b88000" stroke-width="1.5" opacity="0.55"/>
  <line x1="716" y1="89"  x2="758" y2="89"  stroke="#b88000" stroke-width="1.5" opacity="0.50"/>
  <line x1="716" y1="98"  x2="758" y2="98"  stroke="#b88000" stroke-width="1.5" opacity="0.50"/>
  <line x1="716" y1="107" x2="758" y2="107" stroke="#b88000" stroke-width="1.5" opacity="0.45"/>
  <line x1="716" y1="116" x2="758" y2="116" stroke="#b88000" stroke-width="1.5" opacity="0.45"/>
  <line x1="716" y1="125" x2="750" y2="125" stroke="#b88000" stroke-width="1.5" opacity="0.40"/>
  <line x1="716" y1="134" x2="754" y2="134" stroke="#b88000" stroke-width="1.5" opacity="0.40"/>
  <line x1="716" y1="143" x2="746" y2="143" stroke="#b88000" stroke-width="1.5" opacity="0.35"/>
  <line x1="716" y1="152" x2="752" y2="152" stroke="#b88000" stroke-width="1.5" opacity="0.30"/>

  <!-- Gold star bookmark on right page -->
  <path d="M737,70 L738.4,75.2 L743.5,77  L738.4,78.8 L737,84  L735.6,78.8 L730.5,77  L735.6,75.2Z" fill="#f9a03f" opacity="0.90"/>

  <!-- Sparkle accents around book -->
  <path d="M633,54 L634.2,58.2 L638.5,59.5 L634.2,60.8 L633,65  L631.8,60.8 L627.5,59.5 L631.8,58.2Z" fill="#c4b5fd" opacity="0.85"/>
  <path d="M777,56 L778.2,60.2 L782.5,61.5 L778.2,62.8 L777,67  L775.8,62.8 L771.5,61.5 L775.8,60.2Z" fill="#c4b5fd" opacity="0.75"/>
  <path d="M780,148 L781.2,152.2 L785.5,153.5 L781.2,154.8 L780,159 L778.8,154.8 L774.5,153.5 L778.8,152.2Z" fill="#f9a03f" opacity="0.65"/>
  <path d="M630,162 L631.2,166.2 L635.5,167.5 L631.2,168.8 L630,173 L628.8,168.8 L624.5,167.5 L628.8,166.2Z" fill="#f9a03f" opacity="0.60"/>
</svg>
