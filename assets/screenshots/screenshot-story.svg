<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-label="TinyTeller story screen (English, Animals)">
  <defs>
    <style>text { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; }</style>
    <filter id="f-card" x="-5%" y="-2%" width="110%" height="106%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="f-magic" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(255,209,102,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="900" fill="#1B1340"/>

  <!-- Background star decorations -->
  <circle cx="30" cy="25" r="1.5" fill="#E8ECF7" opacity="0.6"/>
  <circle cx="690" cy="18" r="1" fill="#FFD166" opacity="0.7"/>
  <circle cx="700" cy="870" r="1.2" fill="#E8ECF7" opacity="0.5"/>
  <circle cx="20" cy="880" r="0.8" fill="#FFD166" opacity="0.6"/>
  <path d="M680 40 L681 43 L684 44 L681 45 L680 48 L679 45 L676 44 L679 43 Z" fill="#FFD166" opacity="0.65"/>

  <!-- ─── Story Card ─── -->
  <rect x="20" y="20" width="680" height="840" rx="36" fill="#2E2060" filter="url(#f-card)"/>

  <!-- Left golden binding border -->
  <rect x="20" y="20" width="6" height="840" rx="3" fill="#FFD166"/>

  <!-- Page-curl decoration (bottom-right corner) -->
  <polygon points="664,860 700,824 700,860" fill="#1B1340"/>

  <!-- ─── Card Header ─── -->
  <!-- Theme emoji -->
  <text x="58" y="102" font-size="40">🐾</text>

  <!-- Story title -->
  <text x="114" y="87" font-size="26" font-weight="800" fill="#F5F0FF">The Little Duck Who</text>
  <text x="114" y="116" font-size="26" font-weight="800" fill="#F5F0FF">Lost His Quack</text>

  <!-- Language badge -->
  <rect x="544" y="68" width="88" height="28" rx="14" fill="#3D2F7A"/>
  <text x="588" y="87" font-size="13" font-weight="700" fill="#C9A7FF" text-anchor="middle">🇬🇧 EN</text>

  <!-- Divider -->
  <line x1="44" y1="148" x2="676" y2="148" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- ─── Story Content ─── -->
  <!-- Paragraph 1 -->
  <text x="44" y="184" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Once upon a time, in a pond surrounded by tall green</tspan>
    <tspan x="44" dy="30">reeds, there lived a small yellow duck named Pip.</tspan>
    <tspan x="44" dy="30">Every morning Pip would wake up and quack a happy</tspan>
    <tspan x="44" dy="30">greeting to the sun — but one day his quack vanished!</tspan>
  </text>

  <!-- Paragraph 2 -->
  <text x="44" y="342" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Pip searched high and low. He looked under the lily</tspan>
    <tspan x="44" dy="30">pads, behind the old oak tree, and even inside a</tspan>
    <tspan x="44" dy="30">friendly frog's hollow log. "Have you seen my quack?"</tspan>
    <tspan x="44" dy="30">he asked everyone he met.</tspan>
  </text>

  <!-- Paragraph 3 -->
  <text x="44" y="494" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Then a wise old tortoise smiled and said, "Sometimes</tspan>
    <tspan x="44" dy="30">the things we lose are just waiting for the right</tspan>
    <tspan x="44" dy="30">moment." Pip took a deep breath, closed his eyes…</tspan>
    <tspan x="44" dy="30">and out came the biggest, proudest QUACK ever heard!</tspan>
  </text>

  <!-- Paragraph 4 -->
  <text x="44" y="646" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">All the animals cheered. Pip waddled home through</tspan>
    <tspan x="44" dy="30">the golden evening light, happy and whole. That night</tspan>
    <tspan x="44" dy="30">he fell asleep with a tiny smile. 🐾</tspan>
  </text>

  <!-- ─── Another Story Button ─── -->
  <rect x="220" y="772" width="280" height="50" rx="25" fill="#FFD166" filter="url(#f-magic)"/>
  <text x="360" y="803" font-size="19" font-weight="700" fill="#1B1340" text-anchor="middle">✨ Another Story</text>
</svg>
