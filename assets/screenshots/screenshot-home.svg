<svg xmlns="http://www.w3.org/2000/svg" width="430" height="770" viewBox="0 0 430 770" role="img" aria-label="TinyTeller home screen (English)">
  <defs>
    <style>text { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; }</style>
    <filter id="f-magic" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(255,209,102,0.5)"/>
    </filter>
    <filter id="f-soft" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <filter id="f-cat" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <mask id="crescent">
      <circle cx="36" cy="46" r="15" fill="white"/>
      <circle cx="43" cy="43" r="12" fill="black"/>
    </mask>
    <radialGradient id="moon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="430" height="770" fill="#1B1340"/>

  <!-- Star decorations -->
  <circle cx="38" cy="28" r="1.5" fill="#E8ECF7" opacity="0.7"/>
  <circle cx="392" cy="20" r="1" fill="#FFD166" opacity="0.8"/>
  <circle cx="62" cy="74" r="1" fill="#E8ECF7" opacity="0.5"/>
  <circle cx="406" cy="62" r="1.5" fill="#E8ECF7" opacity="0.6"/>
  <circle cx="16" cy="152" r="0.8" fill="#FFD166" opacity="0.65"/>
  <circle cx="416" cy="128" r="0.8" fill="#E8ECF7" opacity="0.5"/>
  <path d="M372 40 L373.2 44 L377 45 L373.2 46 L372 50 L370.8 46 L367 45 L370.8 44 Z" fill="#FFD166" opacity="0.7"/>
  <path d="M50 116 L51 119 L54 120 L51 121 L50 124 L49 121 L46 120 L49 119 Z" fill="#E8ECF7" opacity="0.6"/>

  <!-- ─── Logo (64×64 box, centered at 215,72) ─── -->
  <g transform="translate(183,40)">
    <circle cx="36" cy="46" r="22" fill="url(#moon-glow)"/>
    <circle cx="36" cy="46" r="15" fill="#FFD166" mask="url(#crescent)"/>
    <ellipse cx="30" cy="36" rx="8" ry="9" fill="#4A2E8C"/>
    <ellipse cx="30" cy="38" rx="4.5" ry="5.5" fill="#6B4BAE" opacity="0.75"/>
    <circle cx="30" cy="24" r="9" fill="#4A2E8C"/>
    <polygon points="24,18 26.5,13 29,18" fill="#4A2E8C"/>
    <polygon points="31,18 33.5,13 36,18" fill="#4A2E8C"/>
    <ellipse cx="30" cy="25" rx="6" ry="5.5" fill="#6B4BAE" opacity="0.80"/>
    <path d="M25.5 24.5 Q27.5 22.5 29.5 24.5" fill="none" stroke="#F5F0FF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M30.5 24.5 Q32.5 22.5 34.5 24.5" fill="none" stroke="#F5F0FF" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="27.5" cy="22" r="0.6" fill="#F5F0FF" opacity="0.55"/>
    <circle cx="32.5" cy="22" r="0.6" fill="#F5F0FF" opacity="0.55"/>
    <polygon points="29,28.5 31,28.5 30,31" fill="#FFD166"/>
    <path d="M22 34 Q18 31 19 38 Q22 36 22 40 Z" fill="#3A2070"/>
    <path d="M38 34 Q42 31 41 38 Q38 36 38 40 Z" fill="#3A2070"/>
    <line x1="27" y1="44.5" x2="25" y2="47" stroke="#FFD166" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="27" y1="44.5" x2="27" y2="47.5" stroke="#FFD166" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="33" y1="44.5" x2="35" y2="47" stroke="#FFD166" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="33" y1="44.5" x2="33" y2="47.5" stroke="#FFD166" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M8 12 L9 15 L12 16 L9 17 L8 20 L7 17 L4 16 L7 15 Z" fill="#E8ECF7" opacity="0.90"/>
    <path d="M53 7 L53.8 10 L57 11 L53.8 12 L53 15 L52.2 12 L49 11 L52.2 10 Z" fill="#FFD166" opacity="0.85"/>
    <circle cx="16" cy="24" r="1" fill="#E8ECF7" opacity="0.70"/>
    <circle cx="56" cy="30" r="0.8" fill="#E8ECF7" opacity="0.60"/>
    <circle cx="5" cy="46" r="0.7" fill="#FFD166" opacity="0.65"/>
    <circle cx="58" cy="50" r="0.6" fill="#E8ECF7" opacity="0.50"/>
  </g>

  <!-- ─── Title ─── -->
  <text x="215" y="148" font-size="36" font-weight="900" fill="#F5F0FF" text-anchor="middle" letter-spacing="-0.7">TinyTeller</text>

  <!-- ─── Tagline ─── -->
  <text x="215" y="178" font-size="22" font-weight="600" fill="#C9A7FF" text-anchor="middle">Instant magic stories</text>
  <text x="215" y="205" font-size="22" font-weight="600" fill="#C9A7FF" text-anchor="middle">for little listeners</text>

  <!-- ─── Language toggle (EN active) ─── -->
  <rect x="125" y="253" width="180" height="46" rx="23" fill="#2E2060" filter="url(#f-soft)"/>
  <rect x="129" y="257" width="82" height="38" rx="19" fill="#FFD166"/>
  <text x="170" y="281" font-size="16" font-weight="700" fill="#1B1340" text-anchor="middle">🇬🇧 EN</text>
  <text x="260" y="281" font-size="16" font-weight="700" fill="#C9A7FF" text-anchor="middle">🇩🇪 DE</text>

  <!-- ─── Category section ─── -->
  <text x="215" y="355" font-size="18" font-weight="700" fill="#C9A7FF" text-anchor="middle">Pick a theme:</text>

  <!-- Row 1: Any (active), Animals, Friends -->
  <rect x="35" y="369" width="112" height="38" rx="19" fill="#FFD166" filter="url(#f-cat)"/>
  <text x="91" y="393" font-size="14" font-weight="700" fill="#1B1340" text-anchor="middle">✨ Any</text>

  <rect x="155" y="369" width="118" height="38" rx="19" fill="#2E2060" stroke="#3D2F7A" stroke-width="2" filter="url(#f-cat)"/>
  <text x="214" y="393" font-size="14" font-weight="700" fill="#C9A7FF" text-anchor="middle">🐾 Animals</text>

  <rect x="281" y="369" width="114" height="38" rx="19" fill="#2E2060" stroke="#3D2F7A" stroke-width="2" filter="url(#f-cat)"/>
  <text x="338" y="393" font-size="14" font-weight="700" fill="#C9A7FF" text-anchor="middle">💛 Friends</text>

  <!-- Row 2: Bedtime, Adventure -->
  <rect x="88" y="415" width="118" height="38" rx="19" fill="#2E2060" stroke="#3D2F7A" stroke-width="2" filter="url(#f-cat)"/>
  <text x="147" y="439" font-size="14" font-weight="700" fill="#C9A7FF" text-anchor="middle">🌙 Bedtime</text>

  <rect x="214" y="415" width="130" height="38" rx="19" fill="#2E2060" stroke="#3D2F7A" stroke-width="2" filter="url(#f-cat)"/>
  <text x="279" y="439" font-size="14" font-weight="700" fill="#C9A7FF" text-anchor="middle">🗺️ Adventure</text>

  <!-- ─── Magic Button ─── -->
  <circle cx="215" cy="556" r="80" fill="#FFD166" filter="url(#f-magic)"/>
  <text x="215" y="582" font-size="56" text-anchor="middle">✨</text>

  <!-- ─── Hint text ─── -->
  <text x="215" y="693" font-size="18" font-weight="600" fill="#C9A7FF" text-anchor="middle">Tap the button for a story ✨</text>
</svg>
