<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-label="TinyTeller story screen (German, Bedtime)">
  <defs>
    <style>text { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; }</style>
    <filter id="f-card" x="-5%" y="-2%" width="110%" height="106%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="f-magic" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(255,209,102,0.5)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="900" fill="#1B1340"/>

  <!-- Background star decorations -->
  <circle cx="30" cy="25" r="1.5" fill="#E8ECF7" opacity="0.6"/>
  <circle cx="690" cy="18" r="1" fill="#FFD166" opacity="0.7"/>
  <circle cx="700" cy="870" r="1.2" fill="#E8ECF7" opacity="0.5"/>
  <circle cx="20" cy="880" r="0.8" fill="#FFD166" opacity="0.6"/>
  <path d="M680 40 L681 43 L684 44 L681 45 L680 48 L679 45 L676 44 L679 43 Z" fill="#FFD166" opacity="0.65"/>

  <!-- ─── Story Card ─── -->
  <rect x="20" y="20" width="680" height="840" rx="36" fill="#2E2060" filter="url(#f-card)"/>

  <!-- Left golden binding border -->
  <rect x="20" y="20" width="6" height="840" rx="3" fill="#FFD166"/>

  <!-- Page-curl decoration (bottom-right corner) -->
  <polygon points="664,860 700,824 700,860" fill="#1B1340"/>

  <!-- ─── Card Header ─── -->
  <!-- Theme emoji -->
  <text x="58" y="102" font-size="40">🌙</text>

  <!-- Story title -->
  <text x="114" y="87" font-size="26" font-weight="800" fill="#F5F0FF">Das kleine Glühwürmchen</text>
  <text x="114" y="116" font-size="26" font-weight="800" fill="#F5F0FF">findet seinen Schein</text>

  <!-- Language badge -->
  <rect x="544" y="68" width="88" height="28" rx="14" fill="#3D2F7A"/>
  <text x="588" y="87" font-size="13" font-weight="700" fill="#C9A7FF" text-anchor="middle">🇩🇪 DE</text>

  <!-- Divider -->
  <line x1="44" y1="148" x2="676" y2="148" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- ─── Story Content ─── -->
  <!-- Paragraph 1 -->
  <text x="44" y="184" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Es war einmal ein kleines Glühwürmchen namens Lumi,</tspan>
    <tspan x="44" dy="30">das in einem großen, dunklen Wald lebte. Jeden Abend</tspan>
    <tspan x="44" dy="30">versuchte Lumi, sein Licht leuchten zu lassen — doch</tspan>
    <tspan x="44" dy="30">es wollte einfach nicht so hell strahlen wie die anderen.</tspan>
  </text>

  <!-- Paragraph 2 -->
  <text x="44" y="342" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Traurig flog Lumi durch den Wald und fragte die alten</tspan>
    <tspan x="44" dy="30">Bäume um Rat. "Mach einfach die Augen zu und denke</tspan>
    <tspan x="44" dy="30">an das, was dich glücklich macht", flüsterte die alte</tspan>
    <tspan x="44" dy="30">Weide mit einem sanften Rauschen.</tspan>
  </text>

  <!-- Paragraph 3 -->
  <text x="44" y="494" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Lumi dachte an warme Sommerabende und an seine</tspan>
    <tspan x="44" dy="30">Freunde. Plötzlich begann es zu strahlen — heller als</tspan>
    <tspan x="44" dy="30">je zuvor! Der ganze Wald leuchtete in einem sanften,</tspan>
    <tspan x="44" dy="30">goldenen Schimmer.</tspan>
  </text>

  <!-- Paragraph 4 -->
  <text x="44" y="646" font-size="19" fill="#F5F0FF">
    <tspan x="44" dy="0">Alle Tiere des Waldes staunten. Von diesem Tag an</tspan>
    <tspan x="44" dy="30">leuchtete Lumi jeden Abend, und die kleinen Kinder</tspan>
    <tspan x="44" dy="30">schliefen friedlich ein, umhüllt von seinem sanften</tspan>
    <tspan x="44" dy="30">Glanz. Gute Nacht! 🌙</tspan>
  </text>

  <!-- ─── Another Story Button ─── -->
  <rect x="200" y="772" width="320" height="50" rx="25" fill="#FFD166" filter="url(#f-magic)"/>
  <text x="360" y="803" font-size="19" font-weight="700" fill="#1B1340" text-anchor="middle">✨ Noch eine Geschichte</text>
</svg>
