<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="36" fill="url(#bgGrad)"/>

  <!-- Soft cloud circles -->
  <circle cx="60"  cy="60"  r="38" fill="#8ECAE6" opacity="0.12"/>
  <circle cx="240" cy="70"  r="28" fill="#FFD166" opacity="0.15"/>
  <circle cx="250" cy="240" r="32" fill="#FF9E4A" opacity="0.10"/>
  <circle cx="50"  cy="240" r="24" fill="#8ECAE6" opacity="0.12"/>

  <!-- ── Open Book ── -->
  <g filter="url(#softShadow)">
    <!-- Left page -->
    <path d="M70 175 Q70 165 82 163 L148 158 L148 232 L82 237 Q70 237 70 225 Z"
          fill="#fff" stroke="#8ECAE6" stroke-width="2" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M230 175 Q230 165 218 163 L152 158 L152 232 L218 237 Q230 237 230 225 Z"
          fill="#fff" stroke="#8ECAE6" stroke-width="2" stroke-linejoin="round"/>
    <!-- Spine -->
    <path d="M148 158 Q150 154 152 158 L152 232 Q150 236 148 232 Z" fill="#FFD166"/>
  </g>

  <!-- Page lines left -->
  <line x1="84"  y1="178" x2="144" y2="176" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="84"  y1="190" x2="144" y2="188" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="84"  y1="202" x2="144" y2="200" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.40"/>
  <line x1="84"  y1="214" x2="130" y2="212" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Page lines right -->
  <line x1="156" y1="176" x2="216" y2="178" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="156" y1="188" x2="216" y2="190" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="156" y1="200" x2="216" y2="202" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.40"/>
  <line x1="170" y1="212" x2="216" y2="214" stroke="#8ECAE6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- ── Bird ── -->
  <!-- Body -->
  <ellipse cx="150" cy="130" rx="34" ry="26" fill="#FF9E4A"/>
  <!-- Head -->
  <circle cx="172" cy="110" r="22" fill="#FF9E4A"/>
  <!-- Wing -->
  <path d="M118 133 Q100 115 110 95 Q124 116 150 124 Z" fill="#e8832e"/>
  <!-- Tail feathers -->
  <path d="M118 140 Q98 152 90 168 Q106 155 120 148 Z" fill="#e8832e"/>
  <!-- Belly highlight -->
  <ellipse cx="153" cy="136" rx="18" ry="14" fill="#FFD166" opacity="0.35"/>
  <!-- Eye -->
  <circle cx="180" cy="107" r="5"   fill="#2D3748"/>
  <circle cx="181.5" cy="105.5" r="1.8" fill="#fff"/>
  <!-- Beak -->
  <path d="M192 113 L204 111 L192 117 Z" fill="#FFD166"/>
  <!-- Feet -->
  <line x1="143" y1="156" x2="139" y2="160" stroke="#e8832e" stroke-width="3" stroke-linecap="round"/>
  <line x1="157" y1="156" x2="161" y2="160" stroke="#e8832e" stroke-width="3" stroke-linecap="round"/>

  <!-- Decorative sparkles -->
  <path d="M62 108 L63.4 113 L68.5 114.5 L63.4 116 L62 121 L60.6 116 L55.5 114.5 L60.6 113Z" fill="#FFD166" opacity="0.80"/>
  <path d="M238 95  L239 99  L243.5 100.5 L239 102 L238 106 L237 102 L232.5 100.5 L237 99Z"   fill="#8ECAE6" opacity="0.80"/>

  <!-- ── Text ── -->
  <text x="150" y="268" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif"
        font-size="28" font-weight="800" fill="#2D3748" letter-spacing="0.5">TinyTeller</text>
  <text x="150" y="290" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif"
        font-size="13" fill="#FF9E4A" letter-spacing="1">✨ magic stories ✨</text>
</svg>
