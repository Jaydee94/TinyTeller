<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- Dreamy Nightsky background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B1340"/>
      <stop offset="100%" stop-color="#2D1B69"/>
    </linearGradient>
    <!-- Crescent mask: full moon minus offset carved circle -->
    <mask id="crescent-mask">
      <circle cx="173" cy="172" r="66" fill="white"/>
      <circle cx="204" cy="159" r="53" fill="black"/>
    </mask>
    <!-- Soft golden halo behind the moon -->
    <radialGradient id="moon-glow" cx="173" cy="172" r="97" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="32" fill="url(#bgGrad)"/>

  <!-- ── Stars ── -->
  <!-- 4-point star top-left (silver) -->
  <path d="M50 25 L55 36 L66 40 L55 44 L50 55 L45 44 L34 40 L45 36 Z"
        fill="#E8ECF7" opacity="0.90"/>
  <!-- 4-point star top-right (gold) -->
  <path d="M245 19 L249 26 L256 30 L249 34 L245 41 L241 34 L234 30 L241 26 Z"
        fill="#FFD166" opacity="0.85"/>
  <!-- Dot stars -->
  <circle cx="68"  cy="115" r="4"   fill="#E8ECF7" opacity="0.70"/>
  <circle cx="258" cy="100" r="3"   fill="#E8ECF7" opacity="0.60"/>
  <circle cx="28"  cy="200" r="3"   fill="#FFD166" opacity="0.65"/>
  <circle cx="270" cy="218" r="2.5" fill="#E8ECF7" opacity="0.50"/>
  <circle cx="86"  cy="54"  r="2"   fill="#FFD166" opacity="0.55"/>
  <circle cx="220" cy="60"  r="2"   fill="#E8ECF7" opacity="0.60"/>
  <circle cx="278" cy="150" r="1.5" fill="#E8ECF7" opacity="0.45"/>

  <!-- Moon halo glow -->
  <circle cx="173" cy="172" r="97" fill="url(#moon-glow)"/>

  <!-- ── Crescent moon ── -->
  <circle cx="173" cy="172" r="66" fill="#FFD166" mask="url(#crescent-mask)"/>

  <!-- ── Owl ── -->
  <!-- Wings (behind body) -->
  <path d="M112 120 Q94 106 99 137 Q112 128 112 146 Z" fill="#3A2070"/>
  <path d="M182 120 Q200 106 195 137 Q182 128 182 146 Z" fill="#3A2070"/>

  <!-- Body -->
  <ellipse cx="147" cy="128" rx="35" ry="40" fill="#4A2E8C"/>
  <!-- Belly highlight -->
  <ellipse cx="147" cy="137" rx="20" ry="24" fill="#6B4BAE" opacity="0.75"/>

  <!-- Head -->
  <circle cx="147" cy="76" r="40" fill="#4A2E8C"/>
  <!-- Ear tufts -->
  <polygon points="122,49 132,27 143,49" fill="#4A2E8C"/>
  <polygon points="151,49 162,27 173,49" fill="#4A2E8C"/>
  <!-- Face disc -->
  <ellipse cx="147" cy="80" rx="26" ry="24" fill="#6B4BAE" opacity="0.80"/>

  <!-- Sleepy closed eyes -->
  <path d="M127 78 Q136 69 145 78" fill="none" stroke="#F5F0FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M149 78 Q158 69 167 78" fill="none" stroke="#F5F0FF" stroke-width="6" stroke-linecap="round"/>
  <!-- Tiny eyelash dots -->
  <circle cx="136" cy="67" r="2.6" fill="#F5F0FF" opacity="0.55"/>
  <circle cx="158" cy="67" r="2.6" fill="#F5F0FF" opacity="0.55"/>

  <!-- Beak -->
  <polygon points="143,95 151,95 147,106" fill="#FFD166"/>

  <!-- Feet resting on the moon -->
  <line x1="134" y1="166" x2="125" y2="177" stroke="#FFD166" stroke-width="6" stroke-linecap="round"/>
  <line x1="134" y1="166" x2="134" y2="179" stroke="#FFD166" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="166" x2="169" y2="177" stroke="#FFD166" stroke-width="6" stroke-linecap="round"/>
  <line x1="160" y1="166" x2="160" y2="179" stroke="#FFD166" stroke-width="6" stroke-linecap="round"/>

  <!-- ── Text ── -->
  <text x="150" y="262" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif"
        font-size="30" font-weight="800" fill="#F5F0FF" letter-spacing="0.5">TinyTeller</text>
  <text x="150" y="288" text-anchor="middle"
        font-family="Nunito, system-ui, sans-serif"
        font-size="13" fill="#C9A7FF" letter-spacing="1">✨ magic stories ✨</text>
</svg>
