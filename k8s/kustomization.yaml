apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tinyteller

resources:
  - namespace.yaml
  - backend/configmap.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - ingress.yaml

# Override image tags — update these when releasing a new version
images:
  - name: ghcr.io/jaydee94/tiny-teller-backend
    newTag: latest
  - name: ghcr.io/jaydee94/tiny-teller-frontend
    newTag: latest
