apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tiny-teller-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: tiny-teller-backend
                port:
                  number: 8080
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: tiny-teller-frontend
                port:
                  number: 80
